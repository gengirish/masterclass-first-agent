name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  web:
    name: Next.js build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_AGENT_BASE_URL: https://masterclass-first-agent.fly.dev

  python:
    name: Python lint + preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run ruff check src scripts
      - run: uv run python -m scripts.preflight --ci
