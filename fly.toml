# Fly.io app config. The app name must be globally-unique on Fly.
# Secrets (OPENROUTER_API_KEY, TAVILY_API_KEY, ...) are set via
# `fly secrets set` and never live in this file.

app = "masterclass-first-agent"
primary_region = "bom"

[build]
  dockerfile = "deploy/Dockerfile"
  build-secret = "OPENROUTER_API_KEY"

[env]
  LLM_DEFAULT_PROVIDER = "openrouter"
  MODEL = "openai/gpt-4o-mini"
  EMBED_MODEL = "openai/text-embedding-3-small"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
